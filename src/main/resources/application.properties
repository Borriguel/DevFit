spring.application.name=DevFit

spring.datasource.url=jdbc:mariadb://localhost:3306/devfit_db
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:app_pass}
spring.jpa.hibernate.ddl-auto=update

application.security.jwt.secret-key=${JWT_SECRET_KEY:mySecretKeyForDevFitThatIsVeryLongAndSecure}